[project]
name = "ember-splatting-training"
dynamic = ["version"]
description = "Optional splatting training utilities for Ember."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Paul Schlack" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "ember-core",
    "marimo-3dv",
    "ember-native-faster-gs",
    "fused_ssim",
    "altair>=6.1.0",
    "polars>=1.40.1",
    "tensorboard>=2.20.0",
    "torch>=2.11.0",
]

[project.urls]
Repository = "https://github.com/panicPaul/ember"
Issues = "https://github.com/panicPaul/ember/issues"

[project.optional-dependencies]
all = []
mojo = [
    "max==26.3.0.dev2026042305",
    "mojo==0.26.3.0.dev2026042305",
]
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.sources]
ember-core = { path = "../ember-core", editable = true }
ember-native-faster-gs = { path = "../ember-native-faster-gs", editable = true }
marimo-3dv = { path = "../marimo-3dv", editable = true }
fused_ssim = { git = "https://github.com/rahul-goel/fused-ssim", rev = "328dc9836f513d00c4b5bc38fe30478b4435cbb5" }
max = { index = "modular-nightly" }
mojo = { index = "modular-nightly" }
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "modular-nightly"
url = "https://whl.modular.com/nightly/simple/"

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
root = "../.."
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/ember_splatting_training/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/ember_splatting_training"]
