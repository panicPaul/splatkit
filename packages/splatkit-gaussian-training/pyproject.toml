[project]
name = "splatkit-gaussian-training"
dynamic = ["version"]
description = "Optional Gaussian-specific training utilities for splatkit."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Florian Barthel" },
    { name = "Paul Schlack" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "splatkit",
    "splatkit-native-faster-gs",
    "torch>=2.11.0",
]

[project.urls]
Repository = "https://github.com/panicPaul/splatkit"
Issues = "https://github.com/panicPaul/splatkit/issues"

[project.optional-dependencies]
all = []
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.sources]
splatkit = { path = "../splatkit", editable = true }
splatkit-native-faster-gs = { path = "../splatkit-native-faster-gs", editable = true }
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/splatkit_gaussian_training/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/splatkit_gaussian_training"]
