[project]
name = "marimo-config-gui"
dynamic = ["version"]
description = "Mode-aware marimo configuration UIs for Pydantic models."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Florian Barthel" },
    { name = "Paul Schlack" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "annotated-types>=0.7.0",
    "jaxtyping>=0.3.9",
    "marimo>=0.22.4",
    "numpy>=2.4.4",
    "pydantic>=2.12.5",
    "torch>=2.11.0",
    "tyro>=0.9.35",
]

[project.urls]
Repository = "https://github.com/panicPaul/splatkit"
Issues = "https://github.com/panicPaul/splatkit/issues"

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/marimo_config_gui/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/marimo_config_gui"]
