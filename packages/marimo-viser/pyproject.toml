[project]
name = "marimo-viser"
dynamic = ["version"]
description = "Viser-backed viewer helpers for marimo notebooks using Ember camera contracts."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Paul Schlack" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
    "beartype>=0.22.9",
    "ember-core",
    "jaxtyping>=0.3.9",
    "marimo>=0.22.4",
    "marimo-config-gui>=0.0.1a0",
    "numpy>=2.3.5",
    "pydantic>=2.11.0",
    "torch>=2.11.0",
    "viser>=1.0.26",
]

[project.urls]
Repository = "https://github.com/panicPaul/ember"
Issues = "https://github.com/panicPaul/ember/issues"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.9",
    "ty>=0.0.29",
]
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.sources]
ember-core = { path = "../ember-core", editable = true }
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
root = "../.."
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/marimo_viser/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/marimo_viser"]

[tool.hatch.build.targets.sdist]
include = ["README.md", "LICENSE", "pyproject.toml", "src/marimo_viser/**"]
