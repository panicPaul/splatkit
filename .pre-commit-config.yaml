default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests -q
        language: system
        pass_filenames: false
        types_or: [python]
      - id: check-submodule-remotes
        name: check submodule remotes
        entry: python scripts/check_submodule_remotes.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
