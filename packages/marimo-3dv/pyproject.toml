[project]
name = "marimo-3dv"
dynamic = ["version"]
description = "3D viewer widgets and Gaussian splat utilities for marimo notebooks."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    { name = "Paul Schlack" }
]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
    "anywidget>=0.10.0",
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "marimo>=0.22.4",
    "marimo-config-gui>=0.0.1a0",
    "numpy>=2.4.4",
    "opencv-python-headless>=4.13.0.92",
    "pillow>=11.0.0",
    "plyfile>=1.1.3",
    "pydantic>=2.12.5",
    "starlette>=0.50.0",
    "torch>=2.11.0",
    "traitlets>=5.14.3",
    "uvicorn>=0.38.0",
]

[project.urls]
Repository = "https://github.com/panicPaul/marimo-3dv"
Issues = "https://github.com/panicPaul/marimo-3dv/issues"

[project.optional-dependencies]
desktop = [
    "annotated-types>=0.7.0",
    "pyside6>=6.11.0",
]
examples = [
    "gsplat>=1.5.3",
    "matplotlib>=3.10.8",
]
dev = [
    "annotated-types>=0.7.0",
    "gsplat>=1.5.3",
    "matplotlib>=3.10.8",
    "pyside6>=6.11.0",
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
    "ruff>=0.15.9",
    "ty>=0.0.29",
]
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
root = "../.."
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/marimo_3dv/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/marimo_3dv"]
include = ["src/marimo_3dv/viewer/assets/**"]

[tool.hatch.build.targets.sdist]
include = ["README.md", "LICENSE", "pyproject.toml", "src/marimo_3dv/**"]



# --- Formatting ---

[tool.ruff]
line-length = 80  # Must match above
extend-exclude = [".agents", "legacy_notebooks"]


[tool.ruff.lint] # Mostly just copied over from mojo
ignore = [
  "ANN002",     # TODO: Missing type annotation for *args
  "ANN003",     # TODO: Missing type annotation for **kwargs
  "ANN204",     # TODO: Missing return type annotation for special method
  "ANN401",     # TODO: Dynamically typed expressions (typing.Any) are disallowed in `**kwargs`
  "B008",       # Do not perform function call in argument defaults
  "B017",       # Do not assert blind exception: `Exception`
  "B028",       # No explicit `stacklevel` keyword argument found
  "D105",       # undocumented-magic-method
  "D107",       # Missing docstring in __init__ (constructor args go in class docstring)
  "E402",       # TODO: import top of file
  "E722",       # bare except
  "E731",       # TODO: Don't assign lambda
  "E741",       # TODO: Ambiguous variable name
  "F403",       # glob imports
  "F405",       # TODO: glob imports undefined
  "F821",       # TODO: Undefined names, means script is invalid
  "F841",       # TODO: unused variables
  "FURB122",    # Questionable readability improvement
  "RUF005",     # Consider iterable unpacking instead of concatenation
  "RUF010",     # Use explicit conversion flag
  "RUF012",     # Mutable class attributes should be annotated with `typing.ClassVar`
  "RUF015",     # Prefer `next(iter(iterable))` over single element slice
  "SIM102",     # Collapsible if
  "SIM105",     # Suppressible exception
  "SIM108",     # Use ternary operator
  "SIM114",     # Combine arms with or
  "SIM115",     # Use context manager for opening files
  "SIM117",     # Merge with statements
  "SIM300",     # YODA conditions
  "SIM905",     # Use a list literal instead of str.split
  "F722",       # Unexpected token in forward annotation, clashes with jaxtyping
]
extend-select = [
  "ANN",        # Require function type annotations
  "B",          # Bugbear lints
  "D",          # Pydocstyle lints
  "FURB",       # Refurb lints for modernization
  "I",          # Import sorting lints
  "RUF",        # Ruff specific lints
  "SIM",        # Simplify lints
  "T10",        # Checks for the presence of debugger calls and imports.
  "UP",         # Type annotations should not use Union, Optional, etc
  "ISC",        # Good use of string concatenation
  "SIM",        # Common simplification rules
  "TID",        # Some good import practices
  "PTH",        # Use pathlib instead of os.path
  "NPY",        # Some numpy-specific things

]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "D"]
"notebooks/*" = [
    "ANN",        # Require function type annotations doesn't work well with marimos def _()
    "B018",       # Useless expresions can be nice for output visualization in marimo
    "F401",       # Unused imports from marimo
    "RUF059",     # Unused unpacked variable
]
"src/marimo_viser/notebooks/*" = [
    "ANN",        # Require function type annotations doesn't work well with marimo cell defs
    "B018",       # Useless expressions can be nice for output visualization in marimo
    "D",          # Notebook cells and generated structure are not docstring-oriented
    "F401",       # Unused imports from marimo are normal in notebooks
    "RUF059",     # Unused unpacked variable
]
