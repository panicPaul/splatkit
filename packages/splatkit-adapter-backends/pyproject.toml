[project]
name = "splatkit-adapter-backends"
dynamic = ["version"]
description = "Official backend adapters for splatkit."
requires-python = ">=3.11"
dependencies = [
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "splatkit",
    "torch>=2.11.0",
]

[project.optional-dependencies]
gsplat = [
    "gsplat>=1.5.3",
]
fastergs = [
    "FasterGSCudaBackend",
]
fastgs = [
    "diff-gaussian-rasterization-fastgs>=0.0.0",
]
inria = [
    "diff-gaussian-rasterization>=0.0.0",
]
svraster = [
    "new-svraster-cuda>=0.0.0",
]
stoch3dgs = [
    "threedgrut>=0.0.1",
]
all = [
    "gsplat>=1.5.3",
    "FasterGSCudaBackend",
    "diff-gaussian-rasterization-fastgs>=0.0.0",
    "diff-gaussian-rasterization>=0.0.0",
    "new-svraster-cuda>=0.0.0",
    "threedgrut>=0.0.1",
]
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.extra-build-dependencies]
diff-gaussian-rasterization = [{ requirement = "torch", match-runtime = true }]
diff-gaussian-rasterization-fastgs = [{ requirement = "torch", match-runtime = true }]
FasterGSCudaBackend = [{ requirement = "torch", match-runtime = true }]
new-svraster-cuda = [{ requirement = "torch", match-runtime = true }]

[tool.uv.sources]
splatkit = { path = "../splatkit", editable = true }
diff-gaussian-rasterization = { path = "../../third_party/diff-gaussian-rasterization", editable = true }
diff-gaussian-rasterization-fastgs = { path = "../../third_party/FastGS/submodules/diff-gaussian-rasterization_fastgs", editable = true }
FasterGSCudaBackend = { path = "../../third_party/faster-gaussian-splatting/FasterGSCudaBackend", editable = true }
new-svraster-cuda = { path = "../../third_party/sv_raster/backends/new_cuda", editable = true }
threedgrut = { path = "../../third_party/Stoch3DGS", editable = true }
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.1.0a0"

[tool.hatch.version.raw-options]
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/splatkit_adapter_backends/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/splatkit_adapter_backends"]
