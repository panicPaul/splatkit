[project]
name = "splatkit-backends"
version = "0.1.0"
description = "Official backend adapters for splatkit."
requires-python = ">=3.11"
dependencies = [
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "splatkit",
    "torch>=2.11.0",
]

[project.optional-dependencies]
gsplat = [
    "gsplat>=1.5.3",
]

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "splatkit_backends"
