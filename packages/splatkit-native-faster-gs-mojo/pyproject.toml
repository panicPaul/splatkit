[project]
name = "splatkit-native-faster-gs-mojo"
dynamic = ["version"]
description = "Mojo-backed FasterGS-family native backends for splatkit."
requires-python = ">=3.11"
dependencies = [
    "beartype>=0.22.9",
    "jaxtyping>=0.3.9",
    "max==26.3.0.dev2026042305",
    "mojo==0.26.3.0.dev2026042305",
    "splatkit",
    "splatkit-native-faster-gs",
    "torch>=2.11.0",
]

[project.optional-dependencies]
all = []
cu128 = [
    "torch>=2.11.0",
]
cu130 = [
    "torch>=2.11.0",
]

[build-system]
requires = ["hatchling>=1.27.0", "hatch-vcs>=0.5.0"]
build-backend = "hatchling.build"

[tool.uv]
prerelease = "allow"
conflicts = [
    [
        { extra = "cu128" },
        { extra = "cu130" },
    ],
]

[tool.uv.sources]
max = { index = "modular-nightly" }
mojo = { index = "modular-nightly" }
splatkit = { path = "../splatkit", editable = true }
splatkit-native-faster-gs = { path = "../splatkit-native-faster-gs", editable = true }
torch = [
    { index = "pytorch-cu128", extra = "cu128" },
    { index = "pytorch-cu130", extra = "cu130" },
]

[[tool.uv.index]]
name = "modular-nightly"
url = "https://whl.modular.com/nightly/simple/"

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.1a0"

[tool.hatch.version.raw-options]
root = "../.."
version_scheme = "no-guess-dev"

[tool.hatch.build.hooks.vcs]
version-file = "src/splatkit_native_faster_gs_mojo/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/splatkit_native_faster_gs_mojo"]
