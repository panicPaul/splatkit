[project]
name = "marimo-config-gui"
version = "0.0.1"
description = "Mode-aware marimo configuration UIs for Pydantic models."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "annotated-types>=0.7.0",
    "jaxtyping>=0.3.9",
    "marimo>=0.22.4",
    "numpy>=2.4.4",
    "pydantic>=2.12.5",
    "torch>=2.11.0",
    "tyro>=0.9.35",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/marimo_config_gui"]
